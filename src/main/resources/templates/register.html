<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Register - Dog Seizure Tracker</title>    <link rel="stylesheet" href="/css/common.css">    <link rel="stylesheet" href="/css/button.css">    <link rel="stylesheet" href="/css/form.css">    <link rel="stylesheet" href="/css/button.css">    <link rel="stylesheet" href="/css/footer.css">    <link rel="stylesheet" href="/css/form.css">    <link rel="stylesheet" href="/css/head.css"></head><body><header th:insert="fragments/head :: navigation" class="section section-header"></header><main class="main-content">    <section class="heading">        <section class="intro centered">            <h1>Create an Account</h1>            <p>Sign up to start tracking seizures and health reports for your dog.</p>            <div class="form-panel">                <form class="register-form" th:action="@{/register}" th:object="${userRegisterRequest}"                      th:method="POST">                    <div class="form-row">                        <div class="form-data">                            <label for="username">Username</label>                            <input type="text" placeholder="Username" id="username" th:field="*{username}" required>                        </div>                        <small class="alert-warning" th:if="${#fields.hasErrors('username')}"                               th:errors="*{username}"></small>                    </div>                    <div class="form-row">                        <div class="form-data">                            <label for="first-name">First name</label>                            <input type="text" placeholder="First name" id="first-name" th:field="*{firstName}"                                   required>                        </div>                        <small class="alert-warning" th:if="${#fields.hasErrors('firstName')}"                               th:errors="*{firstName}"></small>                    </div>                    <div class="form-row">                        <div class="form-data">                            <label for="last-name">Last name</label>                            <input type="text" placeholder="Last name" id="last-name" th:field="*{lastName}" required>                        </div>                        <small class="alert-warning" th:if="${#fields.hasErrors('lastName')}"                               th:errors="*{lastName}"></small>                    </div>                    <div class="form-row">                        <div class="form-data">                            <label for="email">Email</label>                            <input type="email" placeholder="you@example.com" id="email" th:field="*{email}" required>                        </div>                        <small class="alert-warning" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>                    </div>                    <div class="form-row">                        <div class="form-data">                            <label for="password">Password</label>                            <input type="password" placeholder="••••••••" id="password" th:field="*{password}" required>                        </div>                        <small class="alert-warning" th:if="${#fields.hasErrors('password')}"                               th:errors="*{password}"></small>                    </div>                    <div class="form-actions">                        <button type="submit" class="button register-button">Create Account</button>                    </div>                </form>            </div>        </section>    </section></main><footer th:insert="fragments/footer :: footer"></footer></body></html>
