<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Dog Seizure Tracker</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/button.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/seizures.css">
    <link rel="stylesheet" href="/css/head.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>
<body>
<header th:insert="fragments/head :: navigation" class="section section-header"></header>
<main class="main-content">
    <section class="seizures-section">
        <h1>Seizure Log</h1>
        <div class="seizures-table">
            <table>
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Duration</th>
                    <th>Severity</th>
                    <th>Recovery</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                                <tr th:each="seizure : ${seizures}">
                                    <td th:text="${seizure.date}"></td>
                                    <td th:text="${seizure.time}"></td>
                                    <td th:text="${seizure.duration}"></td>
                                    <td th:text="${seizure.severity}"></td>
                                    <td th:text="${seizure.recovery}"></td>
                                    <td class="button-table">
                                        <div class="button-in-table">
                                            <a th:href="@{/seizure/{id}/seizure-profile(id=${seizure.id})}" class="button edit-button">Edit Info</a>
                                            <a th:href="@{/seizure/{id}/seizure-profile(id=${seizure.id})}" class="button delete-button">Delete</a>
                                        </div>
                                    </td>
                                </tr>
                <tr th:if="${#lists.isEmpty(seizures)}">
                    <td colspan="5">No seizures logged in.</td>
                </tr>
                </tbody>
            </table>
            <div class="button add-seizure-button-container">
                <a href="/add-seizure" class="button add-seizure">Add New Seizure</a>
            </div>

        </div>
    </section>
</main>
<footer th:insert="fragments/footer :: footer"></footer>
</body>
</html>
