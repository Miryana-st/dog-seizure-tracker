spring.application.name=dog-seizure-tracker

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/dog-seizure_tracker_app?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
logging.level.org.hibernate.persister.entity=ERROR
spring.web.resources.cache.period=3600

spring.profiles.active=dev
spring.mvc.hiddenmethod.filter.enabled=true

users.defaultUser.username=defaultUser
users.defaultUser.password=defaultPassword
users.defaultUser.firstName=firstName
users.defaultUser.lastName=lastName
users.defaultUser.email=default@Email.com
